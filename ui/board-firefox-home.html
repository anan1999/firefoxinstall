<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Board Browser</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Noto Sans TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111418;
      color: #f3f6f8;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(120deg, rgba(39, 118, 156, .18), transparent 44%),
        linear-gradient(315deg, rgba(54, 126, 86, .18), transparent 44%),
        #111418;
    }
    main {
      width: min(920px, calc(100vw - 48px));
    }
    h1 {
      margin: 0 0 10px;
      font-size: 44px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .hint {
      margin: 0 0 22px;
      color: #b8c4ce;
      font-size: 18px;
    }
    form {
      display: grid;
      grid-template-columns: 1fr 132px;
      gap: 10px;
      margin-bottom: 18px;
    }
    input,
    button,
    a {
      border-radius: 8px;
      font: inherit;
    }
    input {
      min-width: 0;
      min-height: 54px;
      border: 1px solid rgba(255, 255, 255, .2);
      background: rgba(255, 255, 255, .08);
      color: #fff;
      padding: 0 18px;
      font-size: 20px;
    }
    button {
      border: 0;
      background: #51cf66;
      color: #071108;
      font-weight: 700;
      font-size: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
    }
    a {
      min-height: 86px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 8px;
      background: rgba(255, 255, 255, .08);
      color: #fff;
      text-decoration: none;
      font-size: 21px;
      font-weight: 650;
      text-align: center;
      padding: 0 14px;
    }
    button:focus,
    button:hover,
    a:focus,
    a:hover {
      background: rgba(255, 255, 255, .16);
      outline: 2px solid #74c0fc;
      outline-offset: 2px;
    }
    button:hover,
    button:focus {
      background: #69db7c;
    }
    @media (max-width: 640px) {
      main {
        width: min(100vw - 24px, 920px);
      }
      h1 {
        font-size: 34px;
      }
      form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Board Browser</h1>
    <p class="hint">Open websites directly from the board GUI.</p>
    <form id="urlForm">
      <input id="urlInput" value="https://www.google.com" autocomplete="off" spellcheck="false">
      <button type="submit">Open</button>
    </form>
    <div class="grid">
      <a href="https://www.youtube.com/">YouTube</a>
      <a href="https://huggingface.co/anan19990108/yolov5s_tflite">HuggingFace Model</a>
      <a href="https://www.google.com/">Google</a>
      <a href="https://example.com/">Example</a>
      <a href="https://www.wikipedia.org/">Wikipedia</a>
      <a href="https://github.com/">GitHub</a>
    </div>
  </main>
  <script>
    document.getElementById("urlForm").addEventListener("submit", function (event) {
      event.preventDefault();
      var input = document.getElementById("urlInput");
      var url = input.value.trim();
      if (!url) return;
      if (!/^[a-z][a-z0-9+.-]*:\/\//i.test(url)) {
        url = "https://" + url;
      }
      window.location.href = url;
    });
  </script>
</body>
</html>
